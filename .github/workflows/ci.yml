name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        # Base SQLite en mémoire (voir tests/conftest.py) : aucune base de
        # données réelle n'est nécessaire pour la CI.
        run: pytest -v --cov=app --cov-report=term-missing

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t oralia-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t oralia-frontend:ci ./frontend
        # NB : ce job vérifie seulement que les images Dockerfile *build*
        # correctement ; il ne les publie sur aucun registre. Ajoutez un
        # step `docker push` (avec les credentials du registre en secrets
        # GitHub) une fois l'hébergeur choisi (cf. DEPLOYMENT.md).
